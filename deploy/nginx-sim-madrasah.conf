# Nginx — SIM-Madrasah (server block TERPISAH untuk IP, tidak mengganggu situs lain)
# Aktif di VPS: /etc/nginx/sites-available/sim-madrasah → symlink ke sites-enabled.
# Backend Go di :8090 (8080 dipakai app lain), frontend Next.js di :3000.

server {
    listen 80;
    server_name 103.175.219.47;     # akses via IP. Untuk domain/HTTPS: ganti ke hostname lalu jalankan certbot.

    client_max_body_size 12m;       # untuk import Excel

    location /api/ {
        proxy_pass http://127.0.0.1:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
